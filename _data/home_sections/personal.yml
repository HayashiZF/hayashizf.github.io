  Ph.D. in Mathematics. My doctoral research was supervised under [Igor Zelenko](https://www.math.tamu.edu/~zelenko/). Our areas are Differential Geometry and Sub-Riemannian Geometry. Before moving to Texas, I was a visiting student at the University of California, Berkeley in 2015, and I received my B.S. in Mathematics and Applied Mathematics from Sun Yat-Sen University in 2017.

  I enjoy all kinds of sports, especially baseball and ultimate frisbee. I was the vice president of the baseball club and a player of Men's baseball team at SYSU, and a member of [Thugmo](http://calmensultimate.org/thugmo.html) Ultimate Frisbee at Berkeley. You may also regularly find me working out at the weight room or jogging. 
  I'm also an ACG lover who enjoys new-airing things every season. 

  Yo empiezo a aprender español, deseo hablar español con fluidez en el futuro. Vamos! 

